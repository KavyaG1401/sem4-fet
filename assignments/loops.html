<!DOCTYPE html>
<html>

<head>
    <title>Layer Switcher with Loops</title>

    <style>
        body {
            font-family: Arial;
            background-color: #eaeaea;
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
            color: darkblue;
        }

        button {
            padding: 10px 16px;
            margin-right: 8px;
            cursor: pointer;
            font-size: 14px;
            border: none;
            background-color: black;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: gray;
        }

        .box {
            width: 350px;
            height: 180px;
            border: 2px solid black;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 180px;
            position: absolute;
            border-radius: 10px;
        }

        #red {
            background-color: crimson;
            top: 180px;
            left: 180px;
            z-index: 1;
        }

        #blue {
            background-color: royalblue;
            top: 180px;
            left: 180px;
            z-index: 0;
        }

        #green {
            background-color: seagreen;
            top: 180px;
            left: 180px;
            z-index: -1;
        }

        .home-btn {
            margin-top: 450px;
            padding: 10px 18px;
            font-size: 15px;
        }

    </style>
</head>

<body>

    <h1>Layer Switcher with Loops</h1>

    <button onclick="showRed()">Show Red</button>

    <button onclick="showBlue()">Show Blue</button>

    <button onclick="showGreen()">Show Green</button>

    <button onclick="autoSwitch()">Auto Switch</button>

    <br><br>

    <div id="red" class="box">
        RED LAYER
    </div>

    <div id="blue" class="box">
        BLUE LAYER
    </div>

    <div id="green" class="box">
        GREEN LAYER
    </div>

    <br><br>

    <a href="https://KavyaG1401.github.io/sem4-fet/">
        <button class="home-btn">Back to Homepage</button>
    </a>

    <!-- External JavaScript File -->
    <script src="loops.js"></script>

</body>

</html>
