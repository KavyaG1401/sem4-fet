<!DOCTYPE html>
<html>

<head>
    <title>Color Box Switcher</title>

    <style>
        body {
            font-family: Verdana;
            background-color: #f5f5f5;
            padding: 40px;
        }

        h2 {
            margin-bottom: 20px;
            color: darkslategray;
        }

        button {
            padding: 10px 18px;
            margin-right: 8px;
            border: none;
            background-color: black;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: gray;
        }

        .box {
            width: 320px;
            height: 170px;
            position: absolute;
            top: 180px;
            left: 220px;
            border-radius: 12px;
            border: 3px solid white;
            color: white;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            line-height: 170px;
        }

        #box1 {
            background-color: purple;
            z-index: 1;
        }

        #box2 {
            background-color: orange;
            z-index: 0;
        }

        #box3 {
            background-color: teal;
            z-index: -1;
        }

        .home {
            margin-top: 420px;
        }
    </style>
</head>

<body>

    <h2>Color Box Switcher</h2>

    <button onclick="showBox1()">Show Purple</button>
    <button onclick="showBox2()">Show Orange</button>
    <button onclick="showBox3()">Show Teal</button>

    <div id="box1" class="box">
        PURPLE BOX
    </div>

    <div id="box2" class="box">
        ORANGE BOX
    </div>

    <div id="box3" class="box">
        TEAL BOX
    </div>

    <script>

        function clearBoxes() {
            document.getElementById("box1").style.zIndex = "0";
            document.getElementById("box2").style.zIndex = "0";
            document.getElementById("box3").style.zIndex = "0";
        }

        function showBox1() {
            clearBoxes();
            document.getElementById("box1").style.zIndex = "5";
        }

        function showBox2() {
            clearBoxes();
            document.getElementById("box2").style.zIndex = "5";
        }

        function showBox3() {
            clearBoxes();
            document.getElementById("box3").style.zIndex = "5";
        }

    </script>

    <div class="home">
        <a href="https://KavyaG1401.github.io/sem4-fet/">
            <button>Go to Homepage</button>
        </a>
    </div>

</body>

</html>
